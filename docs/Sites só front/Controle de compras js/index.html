<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de compras js</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">




</head>

<body>

    <nav>

    </nav>

    <div class="container">
        <div class="head">
            <i class="fas fa-shopping-cart"></i>
            <h1>Controle de Compras</h1>
        </div>


        <form id="form-produto">

            <div class="mb-3">
                <label for="form-label">Descrição do item</label>

                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-tag"></i></span>
                    <input type="text" class="form-control" id="produto" placeholder="Ex: Feijão 3kg">
                </div>
            </div>

            <div class="mb-3">
                <label for="form-label">Quantidade</label>
                <input type="number" class="form-control" id="qtd" value="0">
            </div>

            <div class="mb-3">
                <label for="form-label">Valor Unitário</label>

                <div class="input-group">
                    <span class="input-group-text">R$</span>
                    <input type="number" class="form-control" id="prcUnit" placeholder="0.00" step="0.01">
                </div>
            </div>


            <div class="btns">
                <input class="btn btn-outline-success w-100 btn-custom " id="btn-adc" type="submit" value="Adicionar">

                <button class="btn btn-outline-warning w-100  btn-custom " id="btn-limpa" type="button"
                    onclick="limparForm()">Limpar</button>

                <button class="btn btn-outline-danger w-100  btn-custom " id="btn-delete" type="button"
                    onclick="deletarLista()">Deletar Lista</button>
            </div>



        </form>

        <hr>


        <table class="table table-dark" id="tabela-prod">
            <thead>
                <tr>
                    <th>Descrição</th>
                    <th>Qtd.</th>
                    <th>Valor Unit.</th>
                    <th>Subtotal</th>
                    <th>Ação</th>
                </tr>
            </thead>

            <tbody id="lista-itens">
                <tr id="sem-itens">
                    <td colspan="5" style="text-align:center;">
                        Nenhum item adicionado
                    </td>
                </tr>
            </tbody>

        </table>

        <hr>

        <h2 class="total">
            Total: <span class="valor" id="total-valor">R$ 0,00</span>
        </h2>

    </div>



    <!--Modal Lista-->

    <div class="modal fade" id="modalDeletarLista" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Deletar Lista</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    Tem certeza que deseja apagar toda a lista?
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-danger" id="confirmarDeleteLista">Apagar</button>
                </div>

            </div>
        </div>
    </div>

    <!--Modal linha-->

    <div class="modal fade" id="modalConfirmarItem" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Excluir item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    Tem certeza que deseja excluir este item?
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn btn-danger" id="confirmarDeleteItem">Apagar</button>
                </div>

            </div>
        </div>
    </div>




    <script src="code.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
